<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{index :: layout(~{::#contenido-vista})}">

<body>
    <div id="contenido-vista">
        <h1 class="h3 mb-4 text-gray-800">Formulario Capacitacion</h1>

        <form th:action="@{/capacitaciones/guardar}" th:object="${capacitacion}" method="post">
            <input type="hidden" th:field="*{codigo_cap}" />

            <div class="form-group">
                <label>Área</label>
                <input type="text" class="form-control" th:field="*{area_cap}" maxlength="500" required>
            </div>

            <div class="form-group">
                <label>Nombre del Curso</label>
                <input type="text" class="form-control" th:field="*{nombre_curso_cap}" maxlength="500" required>
            </div>

            <div class="form-group">
                <label>Instructor</label>
                <input type="text" class="form-control" th:field="*{instructor_cap}" maxlength="500" required>
            </div>

            <div class="form-group">
                <label>Tipo</label>
                <input type="text" class="form-control" th:field="*{tipo_cap}" maxlength="500" required>
            </div>

            <div class="form-group">
                <label>Duración (horas)</label>
                <input type="number" class="form-control" th:field="*{duracion_cap}" min="1" required>
            </div>

            <div class="form-group">
                <label>Número de Participantes</label>
                <input type="number" class="form-control" th:field="*{numero_participantes_cap}" min="1" required>
            </div>

            <div class="form-group">
                <label>Costo</label>
                <input type="number" step="0.01" class="form-control" th:field="*{costo_cap}" min="0" required>
            </div>

            <div class="form-group">
                <label>Temario</label>
                <textarea class="form-control" th:field="*{temario_cap}" maxlength="500"></textarea>
            </div>

            <div class="form-group">
                <label>Evaluación / Plan de Acción</label>
                <textarea class="form-control" th:field="*{evaluacion_plan_accion_cap}" maxlength="500"></textarea>
            </div>

            <div class="form-group">
                <label>Lista de Asistentes</label>
                <textarea class="form-control" th:field="*{lista_asistentes_cap}" maxlength="500"></textarea>
            </div>

            <div class="form-group">
                <label>Fecha / Hora / Link</label>
                <input type="text" class="form-control" th:field="*{fecha_hora_link_cap}">
            </div>

            <div class="form-group">
                <label>Fecha</label>
                <input type="date" class="form-control" th:field="*{fecha_cap}" required>
            </div>

            <div class="form-group">
                <label>FK Código Estudiante</label>
                <input type="number" class="form-control" th:field="*{fk_codigo_est}" min="1">
            </div>

            <br>

            <button type="submit" class="btn btn-success">Guardar</button>
            <a th:href="@{/capacitaciones}" class="btn btn-secondary">Volver</a>
        </form>
    </div>
</body>
</html>
