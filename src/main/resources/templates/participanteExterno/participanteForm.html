<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{index :: layout(~{::#contenido-vista})}">

<head>
    <title>Formulario de Participante</title>
</head>
<body>

    <div id="contenido-vista" style="color: black;">
        <div class="d-sm-flex align-items-center justify-content-between mb-4">
            <h1 class="h3 mb-0 text-gray-800" th:text="${participante.codigo_parext != null ? 'Editar Participante' : 'Nuevo Participante'}"></h1>
        </div>

        <div class="card shadow mb-4 col-lg-8 mx-auto">
            <div class="card-body">
                <form id="participanteForm" style="color: black;" th:action="@{/participanteExterno/guardar}" th:object="${participante}" method="post" >
                    <input type="hidden" th:field="*{codigo_parext}">
                    
                    <div class="form-group">
                        <label class="text-dark">Capacitación Destino</label>
                        <select class="form-control text-dark" th:field="*{capacitacion}" name="capacitacion">
                            <option value="">-- Seleccione una capacitación --</option>
                            <option th:each="cap : ${capacitaciones}" 
                                    th:value="${cap.codigo_cap}" 
                                    th:text="${cap.nombre_curso_cap}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="text-dark">Identificación</label>
                        <input type="text" maxlength="10" class="form-control text-dark" th:field="*{identificacion_parext}" name="identificacion_parext">
                    </div>

                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label class="text-dark">Nombres</label>
                            <input type="text" class="form-control text-dark" th:field="*{nombre_parext}" name="nombre_parext">
                        </div>
                        <div class="col-md-6 form-group">
                            <label class="text-dark">Apellidos</label>
                            <input type="text" class="form-control text-dark" th:field="*{apellido_parext}" name="apellido_parext">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label class="text-dark">Teléfono</label>
                            <input type="text" maxlength="10" class="form-control text-dark" th:field="*{telefono_parext}" name="telefono_parext">
                        </div>
                        <div class="col-md-6 form-group">
                            <label class="text-dark">Email</label>
                            <input type="email" class="form-control text-dark" th:field="*{email_parext}" name="email_parext">
                        </div>
                    </div>

                    <hr>
                    <div class="text-right">
                        <a th:href="@{/participanteExterno}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-4">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>

        <style>
            /* Ajuste para que Select2 se vea bien con el estilo de SB Admin 2 */
            .select2-container .select2-selection--single {
                height: calc(1.5 em + 0.75 rem + 2 px) !important;
                padding: 0.375 rem 0.75 rem;
                border: 1 px solid #d1d3e2;
                border-radius: 0.35 rem;
            }
            .select2-container--default .select2-selection--single .select2-selection__arrow {
                height: 34 px;
            }
        </style>

        <script>
            $(document).ready(function() {
                // Inicializar el buscador en el select
                $('#capacitacion').select2({
                    placeholder: "-- Seleccione una capacitación --",
                    allowClear: true,
                    width: '100%'
                });

                // Validaciones del formulario
                $("#participanteForm").validate({
                    errorClass: "text-danger small mt-1",
                    errorElement: "div",
                    rules: {
                        capacitacion: "required",
                        identificacion_parext: { required: true, minlength: 5 },
                        nombre_parext: "required",
                        apellido_parext: "required",
                        email_parext: { required: true, email: true },
                        telefono_parext: { 
                            required: true, 
                            digits: true, 
                            minlength: 10, 
                            maxlength: 10 
                        }
                    },
                    messages: {
                        capacitacion: "Seleccione una capacitación",
                        identificacion_parext: "Ingrese la identificación",
                        nombre_parext: "El nombre es obligatorio",
                        apellido_parext: "El apellido es obligatorio",
                        email_parext: "Ingrese un correo válido",
                        telefono_parext: {
                            required: "El teléfono es obligatorio",
                            digits: "Solo números",
                            minlength: "Debe tener 10 dígitos",
                            maxlength: "Debe tener 10 dígitos"
                        }
                    },
                    // IMPORTANTE: Esta función asegura que el error se muestre bien aunque usemos Select2
                    errorPlacement: function(error, element) {
                        if (element.hasClass('select2-hidden-accessible')) {
                            error.insertAfter(element.next('.select2-container'));
                        } else {
                            error.insertAfter(element);
                        }
                    }
                });

                // Forzar validación cuando cambie el select de Select2
                $('#capacitacion').on('change', function() {
                    $(this).valid();
                });
            });
        </script>
    </div>
</body>
</html>
