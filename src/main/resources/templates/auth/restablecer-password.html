<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SB Admin 2 - Restablecer Contraseña</title>
    <link th:href="@{/sbAdmin/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link th:href="@{/sbAdmin/css/sb-admin-2.min.css}" rel="stylesheet">
</head>
<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-block" th:style="'background: url(' + @{/img/login.svg} + ') center center no-repeat; background-size: contain;'"></div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-2">Restablecer Contraseña</h1>
                                    </div>
                                    <div th:if="${param.error}" class="alert alert-danger small text-center">
                                        Código incorrecto o expirado.
                                    </div>
                                    <form class="user" id="resetForm" th:action="@{/restablecer-password}" method="post">
                                        <input type="hidden" name="correo" th:value="${param.correo}">
                                        <div class="form-group">
                                            <input type="number" class="form-control text-dark" name="codigo" placeholder="Código de 6 dígitos" autocomplete="off">
                                        </div>
                                        <div class="form-group">
                                            <div class="input-group">
                                                <input type="password" class="form-control text-dark" id="password" name="password" placeholder="Nueva Contraseña">
                                                <div class="input-group-append">
                                                    <span class="input-group-text bg-white" style="cursor: pointer;" onclick="togglePassword('password', this)">
                                                        <i class="fas fa-eye text-primary"></i>
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <div class="input-group">
                                                <input type="password" class="form-control text-dark" id="confirmarPassword" name="confirmarPassword" placeholder="Confirmar Nueva Contraseña">
                                                <div class="input-group-append">
                                                    <span class="input-group-text bg-white" style="cursor: pointer;" onclick="togglePassword('confirmarPassword', this)">
                                                        <i class="fas fa-eye text-primary"></i>
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-block">
                                            Cambiar Contraseña
                                        </button>
                                    </form>
                                    <hr>
                                    <div class="text-center">
                                        <a th:href="@{/iniciar-sesion}">Volver al inicio de sesión</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/sbAdmin/vendor/jquery/jquery.min.js}"></script>
    <script th:src="@{/sbAdmin/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/sbAdmin/js/sb-admin-2.min.js}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
    <script>
        $(document).ready(function() {
            $("#resetForm").validate({
                errorClass: "text-danger small mt-1 px-3",
                errorElement: "div",
                errorPlacement: function(error, element) {
                    if (element.parent('.input-group').length) {
                        error.insertAfter(element.parent());
                    } else {
                        error.insertAfter(element);
                    }
                },
                rules: {
                    codigo: { required: true, digits: true, minlength: 6, maxlength: 6 },
                    password: { required: true, minlength: 6 },
                    confirmarPassword: { required: true, equalTo: "#password" }
                },
                messages: {
                    codigo: { required: "El código es obligatorio", digits: "Solo se permiten números", minlength: "Debe tener 6 dígitos", maxlength: "Debe tener 6 dígitos" },
                    password: { required: "La contraseña es obligatoria", minlength: "Mínimo 6 caracteres" },
                    confirmarPassword: { required: "Debe confirmar la contraseña", equalTo: "Las contraseñas no coinciden" }
                }
            });
        });

        function togglePassword(inputId, el) {
            let input = document.getElementById(inputId);
            let icon = $(el).find('i');
            if (input.type === "password") {
                input.type = "text";
                icon.removeClass("fa-eye text-primary").addClass("fa-eye-slash text-danger");
            } else {
                input.type = "password";
                icon.removeClass("fa-eye-slash text-danger").addClass("fa-eye text-primary");
            }
        }
    </script>
</body>
</html>
