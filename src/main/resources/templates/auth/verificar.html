<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>SB Admin 2 - Verificar Cuenta</title>

    <link th:href="@{/sbAdmin/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
    <link th:href="@{/sbAdmin/css/sb-admin-2.min.css}" rel="stylesheet">

</head>

<body class="bg-gradient-primary">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-xl-10 col-lg-12 col-md-9">

                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 mx-auto">
                                <div class="p-5">
                                    <div class="text-center">
                                        <h1 class="h4 text-gray-900 mb-2">Verifica tu cuenta</h1>
                                        <p class="mb-4">Ingresa el código de 6 caracteres que fue enviado a tu correo electrónico.</p>
                                    </div>
                                    
                                    <div th:if="${param.error}" class="alert alert-danger small text-center">
                                        El código ingresado es incorrecto.
                                    </div>

                                    <form class="user" id="verifyForm" th:action="@{/verificar}" method="post">
                                        <input type="hidden" name="correo" th:value="${param.correo}">
                                        
                                        <div class="form-group">
                                            <input type="number" class="form-control text-dark" name="codigo" placeholder="Código de verificación" autocomplete="off">
                                        </div>
                                        
                                        <button type="submit" class="btn btn-primary btn-block">
                                            Verificar Cuenta
                                        </button>
                                    </form>
                                    <hr>
                                    <div class="text-center">
                                        <a th:href="@{/iniciar-sesion}">Volver al inicio de sesión</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script th:src="@{/sbAdmin/vendor/jquery/jquery.min.js}"></script>
    <script th:src="@{/sbAdmin/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/sbAdmin/vendor/jquery-easing/jquery.easing.min.js}"></script>
    <script th:src="@{/sbAdmin/js/sb-admin-2.min.js}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.5/jquery.validate.min.js"></script>
    
    <script th:inline="javascript">
        $(document).ready(function() {
            $("#verifyForm").validate({
                errorClass: "text-danger small mt-1 px-3",
                errorElement: "div",
                rules: {
                    codigo: {
                        required: true,
                        digits: true,
                        minlength: 6,
                        maxlength: 6
                    }
                },
                messages: {
                    codigo: {
                        required: "El código es obligatorio",
                        digits: "Solo se permiten números",
                        minlength: "El código debe tener exactamente 6 dígitos",
                        maxlength: "El código debe tener exactamente 6 dígitos"
                    }
                }
            });
        });
    </script>

</body>

</html>
